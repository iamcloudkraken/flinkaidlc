apiVersion: apps/v1
kind: Deployment
metadata:
  name: flink-platform-ui
  labels:
    app: flink-platform-ui
spec:
  replicas: 2
  selector:
    matchLabels:
      app: flink-platform-ui
  template:
    metadata:
      labels:
        app: flink-platform-ui
    spec:
      containers:
        - name: flink-platform-ui
          image: ${VITE_DOCKER_IMAGE}
          ports:
            - containerPort: 80
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 10
      securityContext:
        runAsNonRoot: true
        runAsUser: 101  # nginx user
