apiVersion: v1
kind: ConfigMap
metadata:
  name: frontend-nginx-config
  namespace: ns-controlplane
  labels:
    app.kubernetes.io/part-of: flink-platform-controlplane
    app.kubernetes.io/name: frontend
data:
  default.conf: |
    server {
        listen 80;
        root /usr/share/nginx/html;
        index index.html;

        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;

        location /api/ {
            proxy_pass http://backend.ns-controlplane.svc.cluster.local:8090;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /realms/ {
            proxy_pass http://keycloak.ns-enterprise.svc.cluster.local:8080;
            proxy_set_header Host keycloak.ns-enterprise.svc.cluster.local:8080;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /kafka-ui/ {
            proxy_pass http://kafka-ui.ns-enterprise.svc.cluster.local:8080/kafka-ui/;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "";
            proxy_buffering off;
            proxy_read_timeout 300s;
        }

        location /flink/ {
            proxy_pass http://nginx-flink-proxy.ns-controlplane.svc.cluster.local:80/flink/;
            proxy_set_header Host $host;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }

        location / {
            try_files $uri $uri/ /index.html;
        }

        gzip on;
        gzip_types text/plain text/css application/json application/javascript text/xml;
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: ns-controlplane
  labels:
    app.kubernetes.io/part-of: flink-platform-controlplane
    app.kubernetes.io/name: frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
        app.kubernetes.io/part-of: flink-platform-controlplane
        app.kubernetes.io/name: frontend
    spec:
      containers:
        - name: frontend
          image: flinkaidlc-frontend:latest
          imagePullPolicy: Never
          ports:
            - containerPort: 80
          volumeMounts:
            - name: nginx-config
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: default.conf
          resources:
            limits:
              memory: 128Mi
              cpu: 100m
            requests:
              memory: 64Mi
              cpu: 50m
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 30
      volumes:
        - name: nginx-config
          configMap:
            name: frontend-nginx-config
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: ns-controlplane
  labels:
    app.kubernetes.io/part-of: flink-platform-controlplane
    app.kubernetes.io/name: frontend
spec:
  selector:
    app: frontend
  ports:
    - port: 80
      targetPort: 80
      nodePort: 30080
  type: NodePort
