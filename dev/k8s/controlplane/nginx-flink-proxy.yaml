apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-flink-proxy-config
  namespace: ns-controlplane
  labels:
    app.kubernetes.io/part-of: flink-platform-controlplane
    app.kubernetes.io/name: nginx-flink-proxy
data:
  default.conf: |
    resolver kube-dns.kube-system.svc.cluster.local valid=10s;

    server {
        listen 80;

        location ~ ^/flink/([^/]+)/([^/]+)/(.*)$ {
            set $tenant_slug $1;
            set $pipeline_id $2;
            set $rest_path $3;
            set $upstream "pipeline-${pipeline_id}-rest.tenant-${tenant_slug}.svc.cluster.local";

            proxy_pass http://$upstream:8081/$rest_path$is_args$args;
            proxy_set_header Host $host;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-flink-proxy
  namespace: ns-controlplane
  labels:
    app.kubernetes.io/part-of: flink-platform-controlplane
    app.kubernetes.io/name: nginx-flink-proxy
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nginx-flink-proxy
  template:
    metadata:
      labels:
        app: nginx-flink-proxy
        app.kubernetes.io/part-of: flink-platform-controlplane
        app.kubernetes.io/name: nginx-flink-proxy
    spec:
      containers:
        - name: nginx-flink-proxy
          image: nginx:1.25-alpine
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
          volumeMounts:
            - name: nginx-config
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: default.conf
          resources:
            limits:
              memory: 64Mi
              cpu: 100m
            requests:
              memory: 32Mi
              cpu: 50m
          livenessProbe:
            tcpSocket:
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 30
      volumes:
        - name: nginx-config
          configMap:
            name: nginx-flink-proxy-config
---
apiVersion: v1
kind: Service
metadata:
  name: nginx-flink-proxy
  namespace: ns-controlplane
  labels:
    app.kubernetes.io/part-of: flink-platform-controlplane
    app.kubernetes.io/name: nginx-flink-proxy
spec:
  selector:
    app: nginx-flink-proxy
  ports:
    - port: 80
      targetPort: 80
  type: ClusterIP
