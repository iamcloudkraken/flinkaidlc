apiVersion: v1
kind: Namespace
metadata:
  name: tenant-10001
  labels:
    app.kubernetes.io/managed-by: flink-platform
    tenant-slug: "10001"
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: flink
  namespace: tenant-10001
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: flink
  namespace: tenant-10001
rules:
  - apiGroups: [""]
    resources: ["pods", "configmaps", "services", "endpoints"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
