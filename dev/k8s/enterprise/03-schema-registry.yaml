apiVersion: apps/v1
kind: Deployment
metadata:
  name: schema-registry
  namespace: ns-enterprise
  labels:
    app.kubernetes.io/part-of: flink-platform-enterprise
    app.kubernetes.io/name: schema-registry
spec:
  replicas: 1
  selector:
    matchLabels:
      app: schema-registry
  template:
    metadata:
      labels:
        app: schema-registry
        app.kubernetes.io/part-of: flink-platform-enterprise
    spec:
      containers:
        - name: schema-registry
          image: confluentinc/cp-schema-registry:7.6.0
          imagePullPolicy: IfNotPresent
          env:
            - name: SCHEMA_REGISTRY_HOST_NAME
              value: "schema-registry"
            - name: SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS
              value: "kafka.ns-enterprise.svc.cluster.local:29092"
            - name: SCHEMA_REGISTRY_LISTENERS
              value: "http://0.0.0.0:8081"
          ports:
            - containerPort: 8081
          resources:
            limits:
              memory: 256Mi
              cpu: 250m
            requests:
              memory: 128Mi
              cpu: 100m
---
apiVersion: v1
kind: Service
metadata:
  name: schema-registry
  namespace: ns-enterprise
  labels:
    app.kubernetes.io/part-of: flink-platform-enterprise
spec:
  selector:
    app: schema-registry
  ports:
    - port: 8081
      targetPort: 8081
  type: ClusterIP
