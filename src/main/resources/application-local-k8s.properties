# Spring Boot local-k8s profile
# Activated alongside local: SPRING_PROFILES_ACTIVE=local,local-k8s
# Overrides application-local.properties values for Kubernetes deployment

# ─── Database ─────────────────────────────────────────────────────────────────
# Postgres running in ns-controlplane
spring.datasource.url=jdbc:postgresql://postgresql.ns-controlplane.svc.cluster.local:5432/flinkplatform
spring.datasource.username=flinkplatform
spring.datasource.password=flinkplatform

# ─── Kafka ────────────────────────────────────────────────────────────────────
# Kafka broker in ns-enterprise (internal listener on port 29092)
spring.kafka.bootstrap-servers=kafka.ns-enterprise.svc.cluster.local:29092

# ─── Schema Registry ──────────────────────────────────────────────────────────
schema.registry.url=http://schema-registry.ns-enterprise.svc.cluster.local:8081

# ─── Kubernetes Provisioner ───────────────────────────────────────────────────
# Enable real K8s API calls (disabled in application-local.properties)
k8s.provisioner.enabled=true

# Platform namespace — backend runs here; used in TenantNamespaceProvisioner
# NetworkPolicy to allow ingress from this namespace into tenant namespaces
kubernetes.platform-namespace=ns-controlplane

# ─── Flink SQL Runner ─────────────────────────────────────────────────────────
# Built locally via docker build; imagePullPolicy: Never in Flink job spec
flink.image=flinkaidlc-flink-sql-runner:latest

# ─── Flink checkpoint/savepoint storage (MinIO in ns-enterprise) ──────────────
# Bucket must match the one created by minio-init Job (flink-local)
flink.state.s3-bucket=flink-local
flink.s3.endpoint=http://minio.ns-enterprise.svc.cluster.local:9000
flink.s3.access-key=minioadmin
flink.s3.secret-key=minioadmin

# ─── Security ─────────────────────────────────────────────────────────────────
# Blank issuer-uri activates the mock JWT decoder (accepts any Bearer token).
# Avoids issuer URI mismatch between tokens issued by localhost Keycloak
# and the in-cluster Keycloak URL.
spring.security.oauth2.resourceserver.jwt.issuer-uri=
