# =============================================
# Local Development Profile
# Run with: SPRING_PROFILES_ACTIVE=local
# =============================================

# PostgreSQL — matches Docker Compose service name
spring.datasource.url=jdbc:postgresql://localhost:5432/flinkplatform
spring.datasource.username=flinkplatform
spring.datasource.password=flinkplatform

# Disable K8s namespace provisioner (NoOpTenantNamespaceProvisioner activates)
k8s.provisioner.enabled=false

# JWT issuer-uri blank -> LocalSecurityConfig mock JwtDecoder activates
spring.security.oauth2.resourceserver.jwt.issuer-uri=

# OAuth2 admin URL blank -> existing NoOpOAuth2ProviderClient activates
oauth2.admin.url=

# Schema Registry (SSRF check bypassed in local profile)
schema.registry.url=http://localhost:8082

# Flink S3 paths (used when k8s.provisioner.enabled=true with kind cluster)
flink.s3.checkpoint-base=s3://flink-local/checkpoints
flink.s3.savepoint-base=s3://flink-local/savepoints

# Verbose logging for local development
logging.level.com.flinkaidlc=DEBUG
logging.level.org.springframework.security=DEBUG
